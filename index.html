<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonic Telecom — Fiber Competitive Intelligence</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  #pw-overlay {
    position: fixed; inset: 0; z-index: 99999;
    background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
    display: flex; align-items: center; justify-content: center;
  }
  #pw-overlay.hidden { display: none; }
  .pw-box {
    background: #1E293B; border: 1px solid #334155; border-radius: 12px;
    padding: 40px; width: 380px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }
  .pw-box h2 { color: #F1F5F9; font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .pw-box p { color: #94A3B8; font-size: 13px; margin-bottom: 24px; }
  .pw-box input {
    width: 100%; padding: 10px 14px; background: #0F172A; border: 1px solid #475569;
    border-radius: 8px; color: #F1F5F9; font-size: 14px; outline: none;
  }
  .pw-box input:focus { border-color: #0C7EC6; }
  .pw-box .error { color: #F87171; font-size: 12px; margin-top: 8px; display: none; }
  #map { height: 650px; width: 100%; border-radius: 12px; }
  .leaflet-popup-content-wrapper { border-radius: 8px; }
  .leaflet-popup-content { margin: 12px 16px; min-width: 280px; max-width: 380px; }
  .tab-btn { transition: all 0.2s; cursor: pointer; border-bottom: 3px solid transparent; }
  .tab-btn.active { border-bottom-color: #0C7EC6; color: #0C7EC6; font-weight: 600; }
  .tab-btn:hover:not(.active) { color: #334155; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .source-tag {
    font-size: 10px; color: #64748B; background: #F1F5F9; padding: 1px 6px;
    border-radius: 3px; margin-left: 4px;
  }
  @media (max-width: 768px) {
    body { padding: 8px; }
    #map { height: 50vh; min-height: 300px; border-radius: 8px; }
    .leaflet-popup-content { min-width: 240px; margin: 8px 12px; font-size: 13px; }
  }
</style>
</head>
<body class="bg-gray-50 min-h-screen p-2 md:p-4">

<!-- Password Gate -->
<div id="pw-overlay">
  <div class="pw-box">
    <h2>Sonic Telecom</h2>
    <p>Fiber Competitive Intelligence</p>
    <input type="password" id="pw-input" placeholder="Enter access code" autofocus
      onkeydown="if(event.key==='Enter')checkPw()">
    <div class="error" id="pw-error">Incorrect code</div>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none;">

  <!-- Header -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-3">
    <div class="flex items-center justify-between flex-wrap gap-3">
      <div>
        <h1 class="text-xl font-bold text-gray-900">Sonic Telecom <span class="text-sm font-normal text-gray-400">FiberComp</span></h1>
        <p class="text-xs text-gray-500 mt-1">FCC BDC J25 (Jun 2025) | Census 2020 | Public filings</p>
      </div>
      <div class="flex gap-1">
        <button class="tab-btn px-3 py-2 text-sm text-gray-500 active" data-tab="map">GIS Map</button>
        <button class="tab-btn px-3 py-2 text-sm text-gray-500" data-tab="profile">Operator Profiles</button>
        <button class="tab-btn px-3 py-2 text-sm text-gray-500" data-tab="valuation">Valuation & Comps</button>
        <button class="tab-btn px-3 py-2 text-sm text-gray-500" data-tab="competitive">Competitive Matrix</button>
      </div>
    </div>
  </div>

  <!-- MAP TAB -->
  <div class="tab-content active" data-tab="map">
    <!-- Stats Cards -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-3" id="stat-cards"></div>

    <!-- Map + Controls -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-3">
      <div class="flex flex-wrap gap-2 mb-3">
        <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide self-center mr-2">BDC Layers</div>
        <div id="layer-toggles" class="flex flex-wrap gap-2"></div>
        <div class="ml-auto flex flex-wrap gap-1" id="region-nav"></div>
      </div>
      <div id="map"></div>
    </div>
  </div>

  <!-- PROFILE TAB -->
  <div class="tab-content" data-tab="profile">
    <div id="profiles-container"></div>
  </div>

  <!-- VALUATION TAB -->
  <div class="tab-content" data-tab="valuation">
    <div id="valuation-container"></div>
  </div>

  <!-- COMPETITIVE TAB -->
  <div class="tab-content" data-tab="competitive">
    <div id="comp-container"></div>
  </div>

</div>

<script src="data.js"></script>
<script src="calculations.js"></script>

<script>
const BDC_FILES = {
  sonic: { file: 'bdc_output/sonic_bdc.js', size: '600 KB' },
  att: { file: 'bdc_output/att_bdc.js', size: '1.5 MB' },
  comcast: { file: 'bdc_output/comcast_bdc.js', size: '332 KB' },
  frontier: { file: 'bdc_output/frontier_bdc.js', size: '805 KB' },
  race: { file: 'bdc_output/race_bdc.js', size: '219 KB' },
};
const bdcData = {};
const bdcLayers = {};
let map;

/* ---- Password ---- */
function simpleHash(s) {
  var h = 0x5f2a1e3d;
  for (var i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
  return (h >>> 0).toString(16).padStart(8, '0') + h.toString(16).slice(-8);
}
function checkPw() {
  const v = document.getElementById('pw-input').value;
  if (simpleHash(v) === '645e2cbf645e2cbf') {
    document.getElementById('pw-overlay').classList.add('hidden');
    document.getElementById('app').style.display = '';
    sessionStorage.setItem('sonic_auth', '1');
    initApp();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
}
if (sessionStorage.getItem('sonic_auth') === '1') {
  document.getElementById('pw-overlay').classList.add('hidden');
  document.getElementById('app').style.display = '';
  initApp();
}

/* ---- Init ---- */
function initApp() {
  initMap();
  initTabs();
  initProfiles();
  initValuation();
  initCompMatrix();
  loadBdcLayers();
}

function initMap() {
  map = L.map('map', { zoomControl: true }).setView([37.7749, -122.4194], 10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM | CARTO',
    maxZoom: 18,
  }).addTo(map);
  setTimeout(() => map.invalidateSize(), 200);

  // Region nav
  const nav = document.getElementById('region-nav');
  REGIONS.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'px-2 py-1 text-xs rounded-md bg-gray-100 hover:bg-gray-200 text-gray-600 transition';
    btn.textContent = r.name;
    btn.title = r.desc;
    btn.addEventListener('click', () => map.flyTo(r.center, r.zoom, { duration: 1 }));
    nav.appendChild(btn);
  });
}

/* ---- BDC Layers ---- */
function loadBdcLayers() {
  const container = document.getElementById('layer-toggles');
  const order = ['sonic', 'att', 'frontier', 'comcast', 'race'];

  order.forEach(key => {
    const prov = PROVIDERS[key];
    if (!prov) return;
    const info = BDC_FILES[key];

    const btn = document.createElement('button');
    btn.className = 'flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium border transition';
    btn.dataset.key = key;
    btn.style.borderColor = '#E2E8F0';
    btn.style.color = '#64748B';
    btn.innerHTML = `<span style="width:10px;height:10px;border-radius:50%;background:${prov.color};display:inline-block;"></span>${prov.shortName} <span class="text-gray-400 ml-1">${info.size}</span>`;
    btn.addEventListener('click', () => toggleLayer(key, btn));
    container.appendChild(btn);

    // Auto-load Sonic + Race (focus providers), preload others
    if (key === 'sonic') {
      loadBdcFile(key, btn, true);
    } else {
      loadBdcFile(key, btn, false);
    }
  });
}

function loadBdcFile(key, btn, autoEnable) {
  const info = BDC_FILES[key];
  const prov = PROVIDERS[key];

  if (bdcData[key]) {
    if (autoEnable) enableLayer(key, btn);
    return;
  }

  btn.innerHTML = `<span style="width:10px;height:10px;border-radius:50%;background:${prov.color};display:inline-block;"></span>${prov.shortName} <span class="text-gray-400 ml-1">loading...</span>`;

  const script = document.createElement('script');
  script.src = info.file;
  script.onload = () => {
    const data = window['BDC_' + key.toUpperCase()];
    if (data) {
      bdcData[key] = data;
      bdcLayers[key] = createBdcLayer(data, prov);
      btn.innerHTML = `<span style="width:10px;height:10px;border-radius:50%;background:${prov.color};display:inline-block;"></span>${prov.shortName} <span class="text-gray-400 ml-1">${info.size}</span>`;
      if (autoEnable) enableLayer(key, btn);
    }
  };
  script.onerror = () => {
    btn.innerHTML = `<span style="width:10px;height:10px;border-radius:50%;background:#ccc;display:inline-block;"></span>${prov.shortName} <span class="text-red-400 ml-1">unavailable</span>`;
    btn.disabled = true;
  };
  document.body.appendChild(script);
}

function enableLayer(key, btn) {
  if (!bdcLayers[key]) return;
  bdcLayers[key].addTo(map);
  const prov = PROVIDERS[key];
  btn.style.borderColor = prov.color;
  btn.style.color = prov.color;
  btn.style.background = prov.color + '10';
  updateStats();
}

function disableLayer(key, btn) {
  if (!bdcLayers[key]) return;
  map.removeLayer(bdcLayers[key]);
  btn.style.borderColor = '#E2E8F0';
  btn.style.color = '#64748B';
  btn.style.background = '';
  updateStats();
}

function createBdcLayer(geojson, provider) {
  return L.geoJSON(geojson, {
    style: (feature) => {
      const cov = feature.properties.c || feature.properties.coveragePct || 0;
      const opacity = Math.min(0.25 + cov / 150, 0.75);
      return {
        fillColor: provider.color,
        fillOpacity: opacity,
        color: '#fff',
        weight: 1,
        opacity: 0.8,
      };
    },
    onEachFeature: (feature, layer) => {
      layer.bindPopup(buildBdcPopup(feature, provider.name, provider.color), { maxWidth: 380 });
    },
  });
}

function toggleLayer(key, btn) {
  if (!bdcData[key]) {
    loadBdcFile(key, btn, true);
    return;
  }
  if (map.hasLayer(bdcLayers[key])) {
    disableLayer(key, btn);
  } else {
    enableLayer(key, btn);
  }
}

/* ---- Stats ---- */
function updateStats() {
  const container = document.getElementById('stat-cards');
  const active = Object.keys(bdcLayers).filter(k => map.hasLayer(bdcLayers[k]));

  if (!active.length) {
    container.innerHTML = '<div class="col-span-full text-center text-xs text-gray-400 py-2">Click provider buttons to show BDC coverage layers</div>';
    return;
  }

  let html = '';
  active.forEach(key => {
    const data = bdcData[key];
    const prov = PROVIDERS[key];
    if (!data) return;
    let bsls = 0, hu = 0;
    data.features.forEach(f => { bsls += f.properties.b || f.properties.bsls || 0; hu += f.properties.h || f.properties.hu100 || 0; });
    const cov = hu > 0 ? (bsls / hu * 100).toFixed(1) : 0;

    html += `<div class="bg-white rounded-lg border-l-4 p-3 shadow-sm" style="border-left-color:${prov.color}">
      <div class="text-xs text-gray-500">${prov.shortName} FTTP</div>
      <div class="text-lg font-bold" style="color:${prov.color}">${(bsls/1000).toFixed(0)}K <span class="text-xs font-normal text-gray-400">BSLs</span></div>
      <div class="text-xs text-gray-400">${data.features.length.toLocaleString()} BGs · ${cov}% coverage</div>
    </div>`;
  });
  container.innerHTML = html;
}

/* ---- Tabs ---- */
function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.querySelector(`.tab-content[data-tab="${btn.dataset.tab}"]`).classList.add('active');
      if (btn.dataset.tab === 'map') setTimeout(() => map.invalidateSize(), 100);
    });
  });
}

/* ---- Profile Tab ---- */
function initProfiles() {
  const container = document.getElementById('profiles-container');
  const order = ['sonic', 'att', 'frontier', 'comcast', 'race'];
  let html = buildExecHtmlLight();

  order.forEach(key => {
    const profile = OPERATOR_PROFILES[key];
    if (profile) html += buildProfileHtmlLight(profile, key);
  });
  container.innerHTML = html;
}

function buildExecHtmlLight() {
  let html = `<div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 mb-4">
    <h3 class="text-base font-bold text-gray-900 mb-3">Key Executives — Sonic Telecom</h3>
    <table class="w-full text-sm">
      <thead><tr class="border-b border-gray-200">
        <th class="text-left py-2 text-gray-500 font-medium">Name</th>
        <th class="text-left py-2 text-gray-500 font-medium">Title</th>
        <th class="text-left py-2 text-gray-500 font-medium">Notes</th>
      </tr></thead><tbody>`;
  KEY_EXECUTIVES.forEach(e => {
    html += `<tr class="border-b border-gray-100"><td class="py-2 font-semibold text-gray-900">${e.name}</td><td class="py-2 text-gray-700">${e.title}</td><td class="py-2 text-gray-500">${e.note}</td></tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

function buildProfileHtmlLight(profile, key) {
  const isSonic = key === 'sonic';
  const color = PROVIDERS[key]?.color || '#333';
  const borderClass = isSonic ? `border-2` : 'border';

  let html = `<div class="bg-white rounded-xl ${borderClass} shadow-sm p-5 mb-4" style="${isSonic ? 'border-color:' + color : 'border-color:#E5E7EB'}">
    <h3 class="text-base font-bold mb-3" style="color:${color}">${profile.name}</h3>
    <table class="w-full text-sm">`;

  const rows = [
    ['HQ', profile.hq],
    ['Founded', profile.founded],
    profile.founder ? ['Founder', profile.founder] : null,
    ['Ownership', profile.ownership],
    profile.ceo ? ['CEO', profile.ceo] : null,
    profile.cfo ? ['CFO', profile.cfo] : null,
    ['Technology', profile.technology],
    ['Max Speed', profile.speeds],
    ['Pricing', profile.pricing],
    profile.subscribers ? ['Subscribers', profile.subscribers] : null,
    profile.revenue ? ['Revenue', profile.revenue] : null,
    profile.ebitda ? ['EBITDA', `~$${profile.ebitda}M <span class="source-tag">${profile.ebitdaSource || ''}</span>`] : null,
    profile.homesPassedEst ? ['Homes Passed (Est.)', profile.homesPassedEst] : null,
    ['Markets', profile.markets],
  ].filter(Boolean);

  rows.forEach(([label, value]) => {
    html += `<tr class="border-b border-gray-100"><td class="py-2 text-gray-500 font-medium w-40">${label}</td><td class="py-2 text-gray-900">${value}</td></tr>`;
  });
  html += `</table>`;

  if (isSonic) {
    const sections = [
      ['Key Differentiators', profile.keyDiff],
      ['Growth Strategy', profile.growthStrategy],
      ['M&A Activity', profile.maActivity],
      ['ABS/Securitization', profile.absHistory],
      ['BEAD', profile.beadStatus],
    ].filter(([, v]) => v);

    sections.forEach(([title, text]) => {
      html += `<div class="mt-3 p-3 bg-gray-50 rounded-lg text-sm text-gray-700"><strong class="text-gray-900">${title}:</strong> ${text}</div>`;
    });
  }

  if (profile.sources) {
    html += `<div class="mt-3 text-xs text-gray-500"><strong>Sources:</strong><ul class="mt-1 ml-4 list-disc">`;
    profile.sources.forEach(s => { html += `<li><a href="${s.url}" target="_blank" class="text-blue-600 hover:underline">${s.text}</a></li>`; });
    html += `</ul></div>`;
  }

  html += `</div>`;
  return html;
}

/* ---- Valuation Tab ---- */
function initValuation() {
  const v = VALUATION_CONTEXT;
  let html = `<div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 mb-4">
    <h3 class="text-base font-bold text-amber-700 mb-3">Valuation Context — Sonic Telecom</h3>
    <table class="w-full text-sm mb-4">
      <tr class="border-b border-gray-100"><td class="py-2 text-gray-500 font-medium w-40">EBITDA</td><td class="py-2 text-gray-900">~$${v.sonicMetrics.ebitda}M <span class="source-tag">${v.sonicMetrics.ebitdaSource}</span></td></tr>
      <tr class="border-b border-gray-100"><td class="py-2 text-gray-500 font-medium">Revenue Range</td><td class="py-2 text-gray-900">$${v.sonicMetrics.revenueRange}M <span class="source-tag">${v.sonicMetrics.revenueSource}</span></td></tr>
      <tr class="border-b border-gray-100"><td class="py-2 text-gray-500 font-medium">Implied Valuation</td><td class="py-2 text-gray-900">$${v.sonicMetrics.impliedValue}M <span class="source-tag">${v.sonicMetrics.impliedSource}</span></td></tr>
    </table>

    <h4 class="text-sm font-bold text-gray-700 mb-2">Scenario Analysis (at $${v.sonicMetrics.ebitda}M EBITDA)</h4>
    <table class="w-full text-sm mb-4">
      <thead><tr class="border-b border-gray-200"><th class="text-left py-2 text-gray-500 font-medium">Scenario</th><th class="text-left py-2 text-gray-500 font-medium">EV ($M)</th></tr></thead>
      <tbody>`;
  v.scenarioAnalysis.forEach(s => { html += `<tr class="border-b border-gray-100"><td class="py-2 text-gray-700">${s.label}</td><td class="py-2 font-semibold text-gray-900">$${s.ev}M</td></tr>`; });
  html += `</tbody></table>

    <h4 class="text-sm font-bold text-gray-700 mb-2">Recent Fiber Comps</h4>
    <table class="w-full text-sm">
      <thead><tr class="border-b border-gray-200"><th class="text-left py-2 text-gray-500 font-medium">Transaction</th><th class="text-left py-2 text-gray-500 font-medium">$/HHP</th><th class="text-left py-2 text-gray-500 font-medium">Multiple</th><th class="text-left py-2 text-gray-500 font-medium">Date</th></tr></thead>
      <tbody>`;
  v.comps.forEach(c => { html += `<tr class="border-b border-gray-100"><td class="py-2 text-gray-700">${c.deal}</td><td class="py-2 text-gray-900">${c.dollarPerHhp ? '$' + c.dollarPerHhp.toLocaleString() : '—'}</td><td class="py-2 font-semibold text-gray-900">${c.multiple}</td><td class="py-2 text-gray-500">${c.date}</td></tr>`; });
  html += `</tbody></table>
    <p class="mt-3 text-xs text-gray-400 italic">Note: Fiber platform valuations have ranged 8-12x EBITDA for scaled operators. At $80M EBITDA, the $475M Getlatka figure implies ~6x — below market, suggesting either stale data or a pre-expansion valuation. All financials are third-party estimates for a private company.</p>
  </div>`;
  document.getElementById('valuation-container').innerHTML = html;
}

/* ---- Competitive Tab ---- */
function initCompMatrix() {
  const m = COMP_MATRIX;
  let html = `<div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
    <h3 class="text-base font-bold text-gray-900 mb-3">Competitive Comparison</h3>
    <div class="overflow-x-auto"><table class="w-full text-sm">
      <thead><tr class="border-b border-gray-200">`;
  m.headers.forEach(h => { html += `<th class="text-left py-2 px-2 text-gray-500 font-medium">${h}</th>`; });
  html += `</tr></thead><tbody>`;
  m.rows.forEach(row => {
    html += `<tr class="border-b border-gray-100">`;
    row.forEach((cell, i) => {
      html += i === 0
        ? `<td class="py-2 px-2 text-gray-500 font-medium">${cell}</td>`
        : `<td class="py-2 px-2 text-gray-900">${cell}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div></div>`;
  document.getElementById('comp-container').innerHTML = html;
}
</script>

</body>
</html>
