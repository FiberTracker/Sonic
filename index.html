<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonic Telecom — Fiber Competitive Intelligence</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<!-- BDC data scripts — loaded in head so vars are global before renderAllBDC -->
<script>
function loadBDCScripts() {
    const files = [
        'bdc_output/sonic_bdc.js',
        'bdc_output/att_bdc.js',
        'bdc_output/frontier_bdc.js',
        'bdc_output/comcast_bdc.js',
        'bdc_output/race_bdc.js',
    ];
    let loaded = 0;
    files.forEach(f => {
        const s = document.createElement('script');
        s.src = f + '?v=2';
        s.async = true;
        s.onload = () => { loaded++; if (loaded === files.length && typeof renderAllBDC === 'function') renderAllBDC(); };
        s.onerror = () => { loaded++; if (loaded === files.length && typeof renderAllBDC === 'function') renderAllBDC(); };
        document.head.appendChild(s);
    });
}
</script>

<style>
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  #pw-overlay {
    position: fixed; inset: 0; z-index: 99999;
    background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
    display: flex; align-items: center; justify-content: center;
  }
  #pw-overlay.hidden { display: none; }
  .pw-box {
    background: #1E293B; border: 1px solid #334155; border-radius: 12px;
    padding: 40px; width: 380px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }
  .pw-box h2 { color: #F1F5F9; font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .pw-box p { color: #94A3B8; font-size: 13px; margin-bottom: 24px; }

<script>
// ============================================
// PASSWORD
// ============================================
function simpleHash(s) {
  var h = 0x5f2a1e3d;
  for (var i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
  return (h >>> 0).toString(16).padStart(8, '0') + h.toString(16).slice(-8);
}
function checkPw() {
  var v = document.getElementById('pw-input').value;
  if (simpleHash(v) === '645e2cbf645e2cbf') {
    document.getElementById('pw-overlay').classList.add('hidden');
    document.getElementById('app').style.display = '';
    sessionStorage.setItem('sonic_auth', '1');
    initApp();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
  return false;
}
if (sessionStorage.getItem('sonic_auth') === '1') {
  document.getElementById('pw-overlay').classList.add('hidden');
  document.getElementById('app').style.display = '';
  initApp();
}

// ============================================
// GLOBALS
// ============================================
var map;
var bdcLayers = { sonic: L.layerGroup(), att: L.layerGroup(), frontier: L.layerGroup(), comcast: L.layerGroup(), race: L.layerGroup() };
var bdcActive = { sonic: true, att: false, frontier: false, comcast: false, race: false };
var PROVIDER_COLORS = { sonic: '#DC2626', att: '#00759E', frontier: '#469A6C', comcast: '#4972AC', race: '#879420' };
var PROVIDER_NAMES = { sonic: 'Sonic Telecom', att: 'AT&T', frontier: 'Frontier', comcast: 'Comcast', race: 'Race Communications' };
var BDC_VARS = { sonic: 'BDC_SONIC', att: 'BDC_ATT', frontier: 'BDC_FRONTIER', comcast: 'BDC_COMCAST', race: 'BDC_RACE' };

// ============================================
// INIT
// ============================================
function initApp() {
  initMap();
  initTabs();
  initProfiles();
  initValuation();
  initCompMatrix();
  loadBDCScripts();
}

function initMap() {
  map = L.map('map').setView([37.7749, -122.4194], 10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM | CARTO', maxZoom: 18,
  }).addTo(map);

  // Add sonic layer by default
  bdcLayers.sonic.addTo(map);

  // Region nav
  var nav = document.getElementById('region-nav');
  REGIONS.forEach(function(r) {
    var btn = document.createElement('button');
    btn.className = 'px-2 py-1 text-xs rounded-md bg-gray-100 hover:bg-gray-200 text-gray-600 transition';
    btn.textContent = r.name;
    btn.title = r.desc;
    btn.onclick = function() { map.flyTo(r.center, r.zoom, { duration: 1 }); };
    nav.appendChild(btn);
  });

  setTimeout(function() { map.invalidateSize(); }, 300);
}

// ============================================
// BDC RENDERING — matches proven midwest pattern
// ============================================
function renderAllBDC() {
  var allKeys = ['sonic', 'att', 'frontier', 'comcast', 'race'];

  allKeys.forEach(function(key) {
    var varName = BDC_VARS[key];
    var data = window[varName];
    if (typeof data === 'undefined' || !data || !data.features) return;

    var color = PROVIDER_COLORS[key];
    var provName = PROVIDER_NAMES[key];

    data.features.forEach(function(f) {
      if (!f.geometry || !f.geometry.coordinates) return;

      // Flip coordinates: GeoJSON is [lng,lat], Leaflet L.polygon wants [lat,lng]
      var coords;
      if (f.geometry.type === 'MultiPolygon') {
        coords = f.geometry.coordinates.map(function(p) {
          return p.map(function(r) {
            return r.map(function(c) { return [c[1], c[0]]; });
          });
        });
      } else {
        coords = f.geometry.coordinates.map(function(r) {
          return r.map(function(c) { return [c[1], c[0]]; });
        });
      }

      var cov = f.properties.c || f.properties.coveragePct || 0;
      var opacity = Math.min(0.2 + (cov / 100) * 0.5, 0.7);

      var poly = L.polygon(coords, {
        color: color,
        fillColor: color,
        fillOpacity: opacity,
        weight: 0.5,
        opacity: 0.4,
      });

      // Popup
      var hu = f.properties.h || f.properties.hu100 || 0;
      var pop = f.properties.p || f.properties.pop100 || 0;
      var bsls = f.properties.b || f.properties.bsls || 0;
      var covPct = f.properties.c || f.properties.coveragePct || 0;
      var covColor = covPct > 80 ? '#15803D' : covPct > 40 ? '#92400E' : '#DC2626';

      poly.bindPopup('<div style="font-family:Inter,-apple-system,sans-serif;min-width:280px;">' +
        '<div style="font-size:10px;color:#64748B;">Census Block Group ' + f.properties.id + '</div>' +
        '<div style="font-weight:700;font-size:14px;color:' + color + ';margin-bottom:8px;">' + provName + ' — FCC BDC</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;">' +
          '<div style="background:#F1F5F9;padding:6px 8px;border-radius:6px;">' +
            '<div style="font-size:9px;color:#64748B;">Housing Units</div>' +
            '<div style="font-weight:700;font-size:16px;color:#0F172A;">' + hu.toLocaleString() + '</div></div>' +
          '<div style="background:#F1F5F9;padding:6px 8px;border-radius:6px;">' +
            '<div style="font-size:9px;color:#64748B;">Population</div>' +
            '<div style="font-weight:700;font-size:16px;color:#0F172A;">' + pop.toLocaleString() + '</div></div>' +
          '<div style="background:#F1F5F9;padding:6px 8px;border-radius:6px;">' +
            '<div style="font-size:9px;color:#64748B;">FTTP BSLs</div>' +
            '<div style="font-weight:700;font-size:16px;color:' + color + ';">' + bsls.toLocaleString() + '</div></div>' +
          '<div style="background:#F0FDF4;padding:6px 8px;border-radius:6px;">' +
            '<div style="font-size:9px;color:#64748B;">Coverage</div>' +
            '<div style="font-weight:700;font-size:16px;color:' + covColor + ';">' + covPct + '%</div></div>' +
        '</div>' +
        '<div style="font-size:9px;color:#94A3B8;margin-top:6px;">Source: FCC BDC J25 (Jun 2025) | Census 2020</div>' +
      '</div>', { maxWidth: 380 });

      bdcLayers[key].addLayer(poly);
    });
  });

  updateStatCards();
  document.getElementById('bdcStats').style.display = 'none';
}

// ============================================
// STAT CARDS
// ============================================
function updateStatCards() {
  var container = document.getElementById('stat-cards');
  var html = '';
  var allKeys = ['sonic', 'att', 'frontier', 'comcast', 'race'];

  allKeys.forEach(function(key) {
    var data = window[BDC_VARS[key]];
    if (!data || !data.features) return;

    var bsls = 0, hu = 0;
    data.features.forEach(function(f) {
      bsls += f.properties.b || f.properties.bsls || 0;
      hu += f.properties.h || f.properties.hu100 || 0;
    });
    var cov = hu > 0 ? (bsls / hu * 100).toFixed(1) : 0;
    var color = PROVIDER_COLORS[key];
    var name = PROVIDER_NAMES[key];

    html += '<div class="bg-white rounded-lg shadow-sm p-3" style="border-left:4px solid ' + color + '">' +
      '<div class="text-xs text-gray-500">' + name + '</div>' +
      '<div class="text-lg font-bold" style="color:' + color + '">' + (bsls/1000).toFixed(0) + 'K <span class="text-xs font-normal text-gray-400">BSLs</span></div>' +
      '<div class="text-xs text-gray-400">' + data.features.length.toLocaleString() + ' areas · ' + cov + '% coverage</div>' +
    '</div>';
  });

  // Sonic ∩ AT&T overlap card
  // Note: AT&T BDC is county-level (5-digit FIPS), Sonic is block-group (12-digit).
  // Match by checking if Sonic's block group falls within an AT&T county.
  var sonicData = window[BDC_VARS['sonic']];
  var attData = window[BDC_VARS['att']];
  if (sonicData && sonicData.features && attData && attData.features) {
    // Build set of AT&T county FIPS codes
    var attCounties = {};
    attData.features.forEach(function(f) { attCounties[f.properties.id] = true; });
    // Determine ID granularity — if AT&T IDs are shorter, match by prefix
    var attIdLen = attData.features[0] ? attData.features[0].properties.id.length : 12;
    var overlapBsls = 0, overlapHu = 0, overlapCount = 0;
    var sonicOnlyBsls = 0, sonicOnlyCount = 0;
    sonicData.features.forEach(function(f) {
      var sid = f.properties.id;
      var matchKey = sid.substring(0, attIdLen);
      var bsls = f.properties.b || f.properties.bsls || 0;
      var hu = f.properties.h || f.properties.hu100 || 0;
      if (attCounties[matchKey]) {
        overlapBsls += bsls;
        overlapHu += hu;
        overlapCount++;
      } else {
        sonicOnlyBsls += bsls;
        sonicOnlyCount++;
      }
    });
    var sonicTotal = 0;
    sonicData.features.forEach(function(f) { sonicTotal += f.properties.b || f.properties.bsls || 0; });
    var overlapPct = sonicTotal > 0 ? (overlapBsls / sonicTotal * 100).toFixed(1) : 0;

    html += '<div class="col-span-2 md:col-span-full bg-gradient-to-r from-red-50 to-blue-50 rounded-lg shadow-sm p-4 border border-red-200">' +
      '<div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">' +
        '<div>' +
          '<div class="text-xs font-semibold text-gray-500 mb-1">SONIC ∩ AT&T OVERLAP</div>' +
          '<div class="text-2xl font-extrabold text-gray-900">' + overlapBsls.toLocaleString() + ' <span class="text-sm font-normal text-gray-500">BSLs overlapped</span></div>' +
          '<div class="text-xs text-gray-500 mt-1">' + overlapCount.toLocaleString() + ' census block groups · ' + overlapHu.toLocaleString() + ' housing units</div>' +
        '</div>' +
        '<div class="flex gap-4">' +
          '<div class="text-center">' +
            '<div class="text-xl font-bold text-red-600">' + overlapPct + '%</div>' +
            '<div class="text-[10px] text-gray-500">of Sonic BSLs<br>face AT&T fiber</div>' +
          '</div>' +
          '<div class="text-center">' +
            '<div class="text-xl font-bold text-green-600">' + sonicOnlyBsls.toLocaleString() + '</div>' +
            '<div class="text-[10px] text-gray-500">Sonic-only BSLs<br>(no AT&T fiber)</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  container.innerHTML = html;
}

// ============================================
// BDC TOGGLE
// ============================================
function toggleBDCLayer(key) {
  bdcActive[key] = !bdcActive[key];
  var btn = document.getElementById('btn-' + key);
  var color = PROVIDER_COLORS[key];

  if (bdcActive[key]) {
    map.addLayer(bdcLayers[key]);
    btn.style.borderColor = color;
    btn.style.color = color;
    btn.style.background = color + '14';
    btn.classList.remove('text-gray-400', 'border-gray-300');
  } else {
    map.removeLayer(bdcLayers[key]);
    btn.style.borderColor = '';
    btn.style.color = '';
    btn.style.background = '';
    btn.classList.add('text-gray-400', 'border-gray-300');
  }
}

// ============================================
// TABS
// ============================================
function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.tab-content').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      document.querySelector('.tab-content[data-tab="' + btn.dataset.tab + '"]').classList.add('active');
      if (btn.dataset.tab === 'map') setTimeout(function() { map.invalidateSize(); }, 100);
    });
  });
}

// ============================================
// PROFILES TAB
// ============================================
function initProfiles() {
  var container = document.getElementById('profiles-container');
  var order = ['sonic', 'att', 'frontier', 'comcast', 'race'];
  var html = '';

  // Executives table
  html += '<div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 mb-4">' +
    '<h3 class="text-base font-bold text-gray-900 mb-3">Key Executives — Sonic Telecom</h3>' +
    '<table class="w-full text-sm"><thead><tr class="border-b border-gray-200">' +
    '<th class="text-left py-2 text-gray-500 font-medium">Name</th>' +
    '<th class="text-left py-2 text-gray-500 font-medium">Title</th>' +
    '<th class="text-left py-2 text-gray-500 font-medium">Notes</th></tr></thead><tbody>';
  KEY_EXECUTIVES.forEach(function(e) {
    html += '<tr class="border-b border-gray-100"><td class="py-2 font-semibold text-gray-900">' + e.name + '</td><td class="py-2 text-gray-700">' + e.title + '</td><td class="py-2 text-gray-500">' + e.note + '</td></tr>';
  });
  html += '</tbody></table></div>';

  // Operator profiles
  order.forEach(function(key) {
    var p = OPERATOR_PROFILES[key];
    if (!p) return;
    var isSonic = key === 'sonic';
    var color = PROVIDERS[key] ? PROVIDERS[key].color : '#333';

    html += '<div class="bg-white rounded-xl shadow-sm p-5 mb-4" style="border:' + (isSonic ? '2px' : '1px') + ' solid ' + (isSonic ? color : '#E5E7EB') + '">';
    html += '<h3 class="text-base font-bold mb-3" style="color:' + color + '">' + p.name + '</h3>';
    html += '<table class="w-full text-sm">';

    var rows = [
      ['HQ', p.hq], ['Founded', p.founded], ['Ownership', p.ownership],
      p.ceo ? ['CEO', p.ceo] : null, p.cfo ? ['CFO', p.cfo] : null,
      ['Technology', p.technology], ['Max Speed', p.speeds], ['Pricing', p.pricing],
      p.subscribers ? ['Subscribers', p.subscribers] : null,
      p.revenue ? ['Revenue', p.revenue] : null,
      p.ebitda ? ['EBITDA', '~$' + p.ebitda + 'M <span class="source-tag">' + (p.ebitdaSource||'') + '</span>'] : null,
      p.homesPassedEst ? ['Homes Passed (Est.)', p.homesPassedEst] : null,
      ['Markets', p.markets],
    ];
    rows.forEach(function(r) {
      if (!r) return;
      html += '<tr class="border-b border-gray-100"><td class="py-2 text-gray-500 font-medium w-40">' + r[0] + '</td><td class="py-2 text-gray-900">' + r[1] + '</td></tr>';
    });
    html += '</table>';

    if (isSonic) {
      [['Key Differentiators', p.keyDiff], ['Growth Strategy', p.growthStrategy], ['M&A Activity', p.maActivity], ['ABS/Securitization', p.absHistory], ['BEAD', p.beadStatus]].forEach(function(s) {
        if (s[1]) html += '<div class="mt-3 p-3 bg-gray-50 rounded-lg text-sm text-gray-700"><strong class="text-gray-900">' + s[0] + ':</strong> ' + s[1] + '</div>';
      });
    }

    if (p.sources) {
      html += '<div class="mt-3 text-xs text-gray-500"><strong>Sources:</strong><ul class="mt-1 ml-4 list-disc">';
      p.sources.forEach(function(s) { html += '<li><a href="' + s.url + '" target="_blank" class="text-blue-600 hover:underline">' + s.text + '</a></li>'; });
      html += '</ul></div>';
    }
    html += '</div>';
  });

  container.innerHTML = html;
}

// ============================================
// VALUATION TAB
// ============================================
function initValuation() {
  var v = VALUATION_CONTEXT;
  var html = '<div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 mb-4">' +
    '<h3 class="text-base font-bold text-amber-700 mb-3">Valuation Context — Sonic Telecom</h3>' +
    '<table class="w-full text-sm mb-4">' +
    '<tr class="border-b border-gray-100"><td class="py-2 text-gray-500 font-medium w-40">EBITDA</td><td class="py-2 text-gray-900">~$' + v.sonicMetrics.ebitda + 'M <span class="source-tag">' + v.sonicMetrics.ebitdaSource + '</span></td></tr>' +
    '<tr class="border-b border-gray-100"><td class="py-2 text-gray-500 font-medium">Revenue Range</td><td class="py-2 text-gray-900">$' + v.sonicMetrics.revenueRange + 'M <span class="source-tag">' + v.sonicMetrics.revenueSource + '</span></td></tr>' +
    '<tr class="border-b border-gray-100"><td class="py-2 text-gray-500 font-medium">Implied Valuation</td><td class="py-2 text-gray-900">$' + v.sonicMetrics.impliedValue + 'M <span class="source-tag">' + v.sonicMetrics.impliedSource + '</span></td></tr>' +
    '</table>' +
    '<h4 class="text-sm font-bold text-gray-700 mb-2">Scenario Analysis (at $' + v.sonicMetrics.ebitda + 'M EBITDA)</h4>' +
    '<table class="w-full text-sm mb-4"><thead><tr class="border-b border-gray-200"><th class="text-left py-2 text-gray-500 font-medium">Scenario</th><th class="text-left py-2 text-gray-500 font-medium">EV ($M)</th></tr></thead><tbody>';
  v.scenarioAnalysis.forEach(function(s) { html += '<tr class="border-b border-gray-100"><td class="py-2 text-gray-700">' + s.label + '</td><td class="py-2 font-semibold text-gray-900">$' + s.ev + 'M</td></tr>'; });
  html += '</tbody></table>' +
    '<h4 class="text-sm font-bold text-gray-700 mb-2">Recent Fiber Comps</h4>' +
    '<table class="w-full text-sm"><thead><tr class="border-b border-gray-200"><th class="text-left py-2 text-gray-500 font-medium">Transaction</th><th class="text-left py-2 text-gray-500 font-medium">$/HHP</th><th class="text-left py-2 text-gray-500 font-medium">Multiple</th><th class="text-left py-2 text-gray-500 font-medium">Date</th></tr></thead><tbody>';
  v.comps.forEach(function(c) { html += '<tr class="border-b border-gray-100"><td class="py-2 text-gray-700">' + c.deal + '</td><td class="py-2 text-gray-900">' + (c.dollarPerHhp ? '$'+c.dollarPerHhp.toLocaleString() : '—') + '</td><td class="py-2 font-semibold text-gray-900">' + c.multiple + '</td><td class="py-2 text-gray-500">' + c.date + '</td></tr>'; });
  html += '</tbody></table>' +
    '<p class="mt-3 text-xs text-gray-400 italic">Note: Fiber platform valuations have ranged 8-12x EBITDA for scaled operators. At $80M EBITDA, the $475M Getlatka figure implies ~6x — below market. All financials are third-party estimates for a private company.</p></div>';
  document.getElementById('valuation-container').innerHTML = html;
}

// ============================================
// COMPETITIVE TAB
// ============================================
function initCompMatrix() {
  var m = COMP_MATRIX;
  var html = '<div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5"><h3 class="text-base font-bold text-gray-900 mb-3">Competitive Comparison</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b border-gray-200">';
  m.headers.forEach(function(h) { html += '<th class="text-left py-2 px-2 text-gray-500 font-medium">' + h + '</th>'; });
  html += '</tr></thead><tbody>';
  m.rows.forEach(function(row) {
    html += '<tr class="border-b border-gray-100">';
    row.forEach(function(cell, i) { html += '<td class="py-2 px-2 ' + (i===0 ? 'text-gray-500 font-medium' : 'text-gray-900') + '">' + cell + '</td>'; });
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';
  document.getElementById('comp-container').innerHTML = html;
}
</script>
